version: "3"

services:
  web:
    container_name: web
    restart: always
    build:
      context: .
    command: sh /app/entrypoint.sh
    expose:
      - "8000"
    env_file:
      .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - back_media:/app/media
      - back_static:/app/static

  db:
    container_name: db
    image: postgres:16
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    volumes:
      - redis-data:/data
  
  celery_worker:
    build:
      context: .
    command: celery -A shop_api worker --loglevel=WARNING
    depends_on:
      - redis
    env_file:
      .env
    volumes:
      - .:/app
    
  celery_beat:
    build:
      context: .
    command: celery -A shop_api beat --loglevel=WARNING
    depends_on:
      - redis
    env_file:
      .env
    volumes:
      - .:/app

  celery_flower:
    build:
      context: .
    command: celery -A shop_api flower --port=5555
    depends_on:
      - redis
    ports:
      - "5556:5555"
    env_file:
      .env
    volumes:
      - .:/app

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - back_media:/app/media
      - back_static:/app/static

volumes:
  db-data:
  redis-data:
  back_media:
  back_static:
